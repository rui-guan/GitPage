<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rui Guan</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    :root {
      --text-size: 15px;
      --text-line-height: 1.6;
      --display-heading-size: 30px;
      --container-width: 900px;
      --profile-image-width: 220px;
      --profile-gap: 40px;
      --nav-bg: #0f2530;
      --nav-bg-2: #133341;
      --nav-text: #e9f1f4;
      --nav-accent: #71b6c7;
      --nav-divider: rgba(233, 241, 244, 0.2);
      --nav-padding-y: 10px;
      --nav-padding-x: 40px;
      --content-top-margin: 120px;
      --content-bottom-margin: 60px;
      --content-side-padding: 20px;
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      color: #111;
      margin: 0;
      background-color: #fff;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: linear-gradient(135deg, var(--nav-bg), var(--nav-bg-2));
      border-bottom: 1px solid var(--nav-divider);
      box-shadow: 0 8px 20px rgba(10, 20, 26, 0.12);
      z-index: 10;
    }

    /* Full-width navigation with controlled inner padding. */
    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 56px;
      box-sizing: border-box;

      padding: var(--nav-padding-y) var(--nav-padding-x);
      font-size: var(--text-size);
    }

    .right-links {
      display: flex;
      gap: 18px;
    }

    .left-links {
      flex: none;
    }

    .links {
      color: var(--nav-text);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.02em;
      transition: color 0.18s ease;
    }

    .links:hover {
      color: var(--nav-accent);
      text-decoration: none;
    }

    .links.current {
      color: var(--nav-accent);
    }
    /* Layout */
    .container {
      max-width: var(--container-width);
      margin: var(--content-top-margin) auto var(--content-bottom-margin) auto;
      padding: 0 var(--content-side-padding);
    }

    .profile-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--profile-image-width);
      column-gap: var(--profile-gap);
      align-items: flex-start;
    }

    .profile-photo img {
      width: var(--profile-image-width);
      border-radius: 4px;
    }

    .main-content {
      min-width: 0;
    }

    .name {
      font-family: "Playfair Display", serif;
      font-size: var(--display-heading-size);
      margin-bottom: 10px;
    }

    p {
      font-size: var(--text-size);
      line-height: var(--text-line-height);
      margin-bottom: 12px;
    }

    a {
      color: inherit;
      text-decoration: underline;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .nav-inner {
        padding: 10px 18px;
      }

      .right-links {
        gap: 12px;
      }

      .container {
        margin-top: 100px;
        padding: 0 18px;
      }

      .profile-layout {
        grid-template-columns: 1fr;
        row-gap: 20px;
      }

      .profile-photo {
        order: -1;
      }

      .profile-photo img {
        width: 150px;
      }
    }
  </style>
</head>

<body>

<!-- Navigation -->
<nav>
  <div class="nav-inner">
    <div class="left-links">
      <a class="links" href="index.html">Rui Guan</a>
    </div>

    <div class="right-links">
      <a class="links current" href="index.html">Home</a>
      <a class="links" href="research.html">Research</a>
      <a class="links" href="./asset/cv.pdf">CV</a>
    </div>
  </div>
</nav>

<!-- Content -->
<div class="container">

  <div class="profile-layout">
    <div class="main-content">
      <div class="name">Rui Guan</div>

      <p>I am a Lecturer in Economics at the University of Kent and hold a PhD from the Universitat Pompeu Fabra.</p>

      <p>My work in behavioral and experimental economics focuses on helping people make better decisions.</p>

      <p>Email: <a href="mailto:r.guan@kent.ac.uk">r.guan@kent.ac.uk</a>.</p>
    </div>

    <div class="profile-photo">
      <img src="./asset/profile.png" alt="Rui Guan">
    </div>

  </div>

</div>

</body>
</html>
