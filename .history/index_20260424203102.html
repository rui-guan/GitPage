<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rui Guan</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    :root {
      --text-size: 15px;
      --text-line-height: 1.6;
      --container-width: 720px;
      --nav-padding-y: 10px;
      --nav-padding-x: 40px;
      --content-top-margin: 120px;
      --content-bottom-margin: 60px;
      --content-side-padding: 20px;
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      color: #111;
      margin: 0;
      background-color: #fff;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #111;
      z-index: 10;
    }

    /* Full-width navigation with controlled inner padding. */
    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;

      padding: var(--nav-padding-y) var(--nav-padding-x);
      font-size: var(--text-size);
    }

    .right-links {
      display: flex;
      gap: 18px;
    }

    .left-links {
      flex: none;
    }

    .links {
      color: #eee;
      text-decoration: none;
      font-weight: 500;
    }

    .links:hover {
      text-decoration: underline;
    }
    /* Layout */
    .container {
      max-width: var(--container-width);
      margin: var(--content-top-margin) auto var(--content-bottom-margin) auto;
      padding: 0 var(--content-side-padding);
    }

    .profile {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .profile img {
      width: 180px;
      border-radius: 4px;
    }

    .profile-text {
      flex: 1;
    }

    .name {
      font-family: "Playfair Display", serif;
      font-size: 30px;
      margin-bottom: 10px;
    }

    p {
      font-size: var(--text-size);
      line-height: var(--text-line-height);
      margin-bottom: 12px;
    }

    a {
      color: inherit;
      text-decoration: underline;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .nav-inner {
        padding: 10px 18px;
      }

      .right-links {
        gap: 12px;
      }

      .container {
        margin-top: 100px;
        padding: 0 18px;
      }

      .profile {
        flex-direction: column;
        gap: 20px;
      }

      .profile img {
        width: 150px;
      }
    }
  </style>
</head>

<body>

<!-- Navigation -->
<nav>
  <div class="nav-inner">
    <div class="left-links">
      <a class="links" href="index.html">Rui Guan</a>
    </div>

    <div class="right-links">
      <a class="links" href="index.html">Home</a>
      <a class="links" href="research.html">Research</a>
      <a class="links" href="./asset/cv.pdf">CV</a>
    </div>
  </div>
</nav>

<!-- Content -->
<div class="container">

  <div class="profile">
    
    <img src="./asset/profile.png" alt="Rui Guan">

    <div class="profile-text">
      <div class="name">Rui Guan</div>

      <p>I am a Lecturer in Economics at the University of Kent.</p>

      <p>I hold a PhD in Economics from the Universitat Pompeu Fabra. My research lies in behavioural and experimental economics, with a focus on decision-making.</p>

      <p>Email: <a href="mailto:r.guan@kent.ac.uk">r.guan@kent.ac.uk</a>.</p>
    </div>

  </div>

</div>

</body>
</html>
